<div class="catalog-page">
  <div class="filters">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar por nombre</mat-label>
      <input
        matInput
        [ngModel]="searchTerm()"
        (ngModelChange)="onSearchInput($event)"
        placeholder="Ej: audífonos"
      />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="category-field">
      <mat-label>Categoría</mat-label>
      <mat-select [value]="selectedCategory()" (selectionChange)="onCategoryChange($event.value)">
        <mat-option value="">Todas</mat-option>
        @for (category of categories(); track category) {
          <mat-option [value]="category">{{ category }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>

  @if (loading()) {
    <app-state-message variant="loading" message="Cargando productos..."></app-state-message>
  } @else if (errorMessage()) {
    <app-state-message
      variant="error"
      icon="error_outline"
      [message]="errorMessage()!"
      actionLabel="Reintentar"
      (action)="load()"
    ></app-state-message>
  } @else if (products().length === 0) {
    <app-state-message
      variant="empty"
      icon="inventory_2"
      message="No encontramos productos con esos filtros."
    ></app-state-message>
  } @else {
    <div class="product-grid">
      @for (product of products(); track product.id) {
        <app-product-card
          [product]="product"
          [favorited]="favoritedIds().has(product.id)"
          [addingToCart]="addingIds().has(product.id)"
          [togglingFavorite]="togglingIds().has(product.id)"
          (addToCart)="addToCart($event)"
          (toggleFavorite)="toggleFavorite($event)"
        ></app-product-card>
      }
    </div>

    @if (meta(); as m) {
      <mat-paginator
        [length]="m.total"
        [pageSize]="m.limit"
        [pageIndex]="m.page - 1"
        [hidePageSize]="true"
        (page)="onPageChange($event)"
      ></mat-paginator>
    }
  }
</div>
